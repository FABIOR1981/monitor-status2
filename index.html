<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Monitor de Servicios</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📊</text></svg>"
    />

    <style>
      body {
        margin: 0;
        padding: 20px;
      }
      .container {
        max-width: 1000px;
        margin: 0 auto;
        padding: 30px;
        min-height: 60vh;
      }
      h1 {
        text-align: center;
        margin-bottom: 5px;
      }
      .info-bar {
        text-align: center;
        margin-bottom: 20px;
        font-size: 0.9em;
      }
      .update-info {
        text-align: center;
        margin-bottom: 20px;
      }
      #monitor-table {
        width: 100%;
        border-collapse: collapse;
        margin-bottom: 20px;
      }
      #monitor-table th,
      #monitor-table td {
        text-align: left;
      }
      #monitor-table td a {
        text-decoration: none;
        font-size: 0.9em;
        word-break: break-all;
      }
      #monitor-table td:nth-child(n + 3):nth-child(-n + 8) {
        text-align: center;
      }
      .psi-button,
      .btn-primary {
        border: none;
        padding: 5px 8px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 0.8em;
        transition: background-color 0.2s;
      }
      .latency-metric {
        font-size: 1em;
      }

      /* =======================================================
         NUEVO: ESTILOS PARA VISTA DE TARJETAS
         ======================================================= */
      .vista-toggle-container {
        display: flex;
        justify-content: center;
        gap: 10px;
        margin-bottom: 20px;
        padding: 10px;
      }

      .vista-toggle-btn {
        padding: 8px 20px;
        border-radius: 20px;
        border: 2px solid #007bff;
        background: white;
        color: #007bff;
        font-weight: 600;
        font-size: 0.95em;
        cursor: pointer;
        transition: all 0.2s ease;
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      .vista-toggle-btn:hover {
        background: #e8f4ff;
        transform: translateY(-1px);
      }

      .vista-toggle-btn.activo {
        background: #007bff;
        color: white;
        border-color: #007bff;
      }

      .vista-toggle-btn.activo:hover {
        background: #0056b3;
      }

      /* Grid de tarjetas */
      .grid-tarjetas {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 20px;
        margin-bottom: 30px;
        display: none; /* Oculto por defecto */
      }

      .grid-tarjetas.visible {
        display: grid;
      }

      .tarjeta-servicio {
        background: white;
        border-radius: 12px;
        padding: 20px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        border-left: 5px solid;
        transition: transform 0.2s, box-shadow 0.2s;
        position: relative;
      }

      .tarjeta-servicio:hover {
        transform: translateY(-3px);
        box-shadow: 0 6px 20px rgba(0,0,0,0.12);
      }

      .tarjeta-servicio.estado-ok { border-left-color: #4caf50; background: linear-gradient(135deg, #ffffff 0%, #e8f5e9 100%); }
      .tarjeta-servicio.estado-lento { border-left-color: #ff9800; background: linear-gradient(135deg, #ffffff 0%, #fff3e0 100%); }
      .tarjeta-servicio.estado-critico { border-left-color: #f44336; background: linear-gradient(135deg, #ffffff 0%, #ffebee 100%); }
      .tarjeta-servicio.estado-caido { border-left-color: #9e9e9e; background: linear-gradient(135deg, #ffffff 0%, #f5f5f5 100%); }

      .tarjeta-servicio.directo {
        border-right: 3px solid #3498db;
      }

      .tarjeta-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
      }

      .tarjeta-nombre {
        font-weight: 600;
        font-size: 1.1em;
        color: #333;
      }

      .tarjeta-fuente {
        font-size: 1.2em;
        opacity: 0.7;
      }

      .tarjeta-latencia {
        font-size: 2em;
        font-weight: 700;
        color: #333;
        margin-bottom: 5px;
      }

      .tarjeta-unidad {
        font-size: 0.5em;
        font-weight: 400;
        color: #888;
      }

      .tarjeta-promedio {
        font-size: 0.9em;
        color: #666;
        margin-bottom: 8px;
      }

      .tarjeta-tendencia {
        font-size: 1.3em;
        margin-bottom: 10px;
        letter-spacing: 2px;
      }

      .tarjeta-estado {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 8px;
      }

      .tarjeta-estado-icono {
        font-size: 1.3em;
      }

      .tarjeta-estado-texto {
        font-weight: 600;
        font-size: 0.95em;
      }

      .tarjeta-errores {
        font-size: 0.8em;
        color: #c92a2a;
        margin-bottom: 8px;
        cursor: pointer;
      }

      .tarjeta-errores:hover {
        text-decoration: underline;
      }

      .tarjeta-url {
        font-size: 0.8em;
        color: #888;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .tarjeta-url a {
        color: #1976d2;
        text-decoration: none;
      }

      .tarjeta-url a:hover {
        text-decoration: underline;
      }

      .tarjeta-acciones {
        margin-top: 10px;
        display: flex;
        gap: 8px;
      }

      /* Resumen superior para tarjetas */
      .resumen-superior {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 15px;
        margin-bottom: 25px;
        display: none;
      }

      .resumen-superior.visible {
        display: grid;
      }

      .contador {
        background: white;
        border-radius: 12px;
        padding: 15px;
        text-align: center;
        box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        border-top: 4px solid;
        transition: transform 0.2s;
      }

      .contador:hover {
        transform: translateY(-2px);
      }

      .contador.ok { border-top-color: #4caf50; }
      .contador.ok .contador-numero { color: #4caf50; }
      .contador.lento { border-top-color: #ff9800; }
      .contador.lento .contador-numero { color: #ff9800; }
      .contador.critico { border-top-color: #f44336; }
      .contador.critico .contador-numero { color: #f44336; }
      .contador.caido { border-top-color: #9e9e9e; }
      .contador.caido .contador-numero { color: #9e9e9e; }

      .contador-numero {
        display: block;
        font-size: 2em;
        font-weight: 700;
        line-height: 1;
        margin-bottom: 5px;
      }

      .contador-label {
        font-size: 0.85em;
        color: #666;
        font-weight: 500;
      }

      /* Ocultar tabla cuando tarjetas están activas */
      .table-scroll-container.tarjetas-activas {
        display: none;
      }

      @media (max-width: 768px) {
        .resumen-superior {
          grid-template-columns: repeat(2, 1fr);
        }
        .grid-tarjetas {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 480px) {
        .resumen-superior {
          grid-template-columns: 1fr;
        }
      }
    </style>

    <link rel="stylesheet" href="css/monitor_base.css" />
    <link id="estilo-principal" rel="stylesheet" href="css/monitor_def.css" />
  </head>
  <body>
    <main>
      <!-- Botón Toggle Modo Oscuro - Esquina Superior Derecha -->
      <button
        id="theme-toggle-btn"
        class="theme-toggle-button-corner"
        onclick="toggleDarkMode()"
        title="Cambiar modo de visualización"
      >
        <span id="theme-icon">🌙</span>
      </button>

      <div class="container">
        <h1 id="titulo-principal">Monitor de Estado de Servicios</h1>

        <div style="text-align: center; margin-bottom: 15px">
          <label
            for="duracion-selector"
            style="font-size: 0.9em; margin-right: 8px"
            >Duración del historial:</label
          >
          <select
            id="duracion-selector"
            style="
              padding: 5px 10px;
              border-radius: 4px;
              border: 1px solid #ccc;
              font-size: 0.9em;
              cursor: pointer;
            "
            aria-label="Seleccionar duración del historial"
          ></select>
          <button
            id="btn-reiniciar"
            class="btn-primary"
            style="margin-left: 15px; padding: 5px 15px; font-size: 0.9em"
            onclick="reiniciarMonitoreo()"
            aria-label="Reiniciar monitoreo de servicios"
          >
            <span aria-hidden="true">🔄</span>
            <span id="texto-btn-reiniciar">Reiniciar Monitoreo</span>
          </button>
        </div>

        <!-- NUEVO: Toggle Vista Tabla / Tarjetas -->
        <div class="vista-toggle-container">
          <button
            id="btn-vista-tabla"
            class="vista-toggle-btn activo"
            onclick="cambiarVista('tabla')"
            title="Ver como tabla"
          >
            📋 Tabla
          </button>
          <button
            id="btn-vista-tarjetas"
            class="vista-toggle-btn"
            onclick="cambiarVista('tarjetas')"
            title="Ver como tarjetas"
          >
            🎯 Tarjetas
          </button>
        </div>

        <!-- NUEVO: Resumen superior (solo visible en vista tarjetas) -->
        <div id="resumen-superior" class="resumen-superior">
          <div class="contador ok" data-estado="ok">
            <span class="contador-numero" id="contador-ok">0</span>
            <span class="contador-label">🟢 OK</span>
          </div>
          <div class="contador lento" data-estado="lento">
            <span class="contador-numero" id="contador-lento">0</span>
            <span class="contador-label">🟡 Lentos</span>
          </div>
          <div class="contador critico" data-estado="critico">
            <span class="contador-numero" id="contador-critico">0</span>
            <span class="contador-label">🔴 Críticos</span>
          </div>
          <div class="contador caido" data-estado="caido">
            <span class="contador-numero" id="contador-caido">0</span>
            <span class="contador-label">⚫ Caídos</span>
          </div>
        </div>

        <div
          class="info-bar"
          id="info-bar-msg"
          role="status"
          aria-live="polite"
        ></div>

        <div style="text-align: center; margin-bottom: 10px">
          <div class="menu-horizontal">
            <a
              href="leyenda.html"
              id="enlace-leyenda"
              target="_blank"
              rel="noopener noreferrer"
              class="menu-item"
              title="Ver rangos y colores de latencia"
            >
              📊 Leyenda
            </a>
            <a
              href="abm-webs.html"
              id="enlace-abm"
              class="menu-item"
              style="display: none"
              title="Administrar sitios web monitoreados"
            >
              ⚙️ ABM Webs
            </a>
          </div>
        </div>

        <div
          class="update-info"
          id="ultima-actualizacion"
          role="status"
          aria-live="polite"
        ></div>

        <!-- Los filtros se insertarán aquí dinámicamente -->

        <!-- VISTA TABLA (original) -->
        <div class="table-scroll-container" id="tabla-container">
          <table
            id="monitor-table"
            role="table"
            aria-label="Tabla de monitoreo de servicios"
          >
            <thead>
              <tr>
                <th id="header-service" scope="col"></th>
                <th id="header-url" scope="col"></th>
                <th id="header-latency-actual" scope="col"></th>
                <th id="header-status-actual" scope="col"></th>
                <th id="header-promedio-ms" scope="col"></th>
                <th id="header-promedio-status" scope="col"></th>
                <th id="header-action" scope="col"></th>
              </tr>
            </thead>
            <tbody id="status-table-body"></tbody>
          </table>
        </div>

        <!-- NUEVO: VISTA TARJETAS -->
        <div id="grid-tarjetas" class="grid-tarjetas"></div>
      </div>
    </main>

    <!-- Contenedor de notificaciones (se crea dinámicamente) -->

    <script defer src="js/config.js"></script>
    <script defer src="js/i18n.js"></script>
    <script defer src="js/script.js"></script>
  </body>
</html>
